name: Release Windows x86_64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build Windows x86_64 release
        run: npm run tauri -- build --target x86_64-pc-windows-msvc

      - name: Find asset
        id: asset
        shell: pwsh
        run: |
          $bundleRoots = @(
            'src-tauri\target\release\bundle',
            'src-tauri\target\x86_64-pc-windows-msvc\release\bundle'
          )
          $asset = $bundleRoots |
            ForEach-Object { Get-ChildItem -Path $_ -Recurse -File -ErrorAction SilentlyContinue } |
            Where-Object { $_.Extension -in '.exe', '.msi' } |
            Select-Object -First 1
          if (-not $asset) { throw 'No Windows installer asset found' }
          "path=$($asset.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($asset.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.path }}
          generate_release_notes: true
