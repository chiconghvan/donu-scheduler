name: Release Windows x86_64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build Windows x86_64 release
        run: npm run tauri -- build --target x86_64-pc-windows-msvc

      - name: Find installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path 'src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis' -Filter '*-setup.exe' -File -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $installer) { throw 'No nsis setup asset found' }
          "path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create portable ZIP
        id: portable
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $portableDir = Join-Path $PWD 'DonuScheduler-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          Copy-Item -Path 'src-tauri\target\x86_64-pc-windows-msvc\release\donu-scheduler.exe' -Destination (Join-Path $portableDir 'DonuScheduler.exe')
          New-Item -ItemType File -Force -Path (Join-Path $portableDir '.portable') | Out-Null

          $zipName = "DonuScheduler_${version}_x64-portable.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $zipName
          "path=$((Resolve-Path $zipName).Path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.installer.outputs.path }}
            ${{ steps.portable.outputs.path }}
          generate_release_notes: true
          overwrite: true
          make_latest: true
